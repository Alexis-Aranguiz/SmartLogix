
services:

  # INFRAESTRUCTURA: Zookeeper
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: smartlogix-zookeeper
    networks:
      - app-network
    ports:
      - "2181:2181"              # Puerto externo:interno de Zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      # Verifica que Zookeeper responde antes de iniciar Kafka
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # INFRAESTRUCTURA: Kafka
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: smartlogix-kafka
    networks:
      - app-network
    ports:
      - "9092:9092"              # Puerto externo:interno de Kafka
    depends_on:
      zookeeper:
        condition: service_healthy   # Espera a que Zookeeper esté listo
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      # Verifica que Kafka responde antes de iniciar los microservicios
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # MICROSERVICIO: ms-usuarios
  ms-usuarios:
    build:
      context: ./ms-usuarios     # Carpeta donde está el Dockerfile
      dockerfile: Dockerfile
    container_name: ms-usuarios
    networks:
      - app-network
    ports:
      - "8081:8080"             
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8080
    restart: on-failure          # Reinicia si falla (ej. si Kafka no está listo)

  # MICROSERVICIO: ms-inventario

  ms-inventario:
    build:
      context: ./ms-inventario
      dockerfile: Dockerfile
    container_name: ms-inventario
    networks:
      - app-network
    ports:
      - "8082:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8080
    restart: on-failure

  # MICROSERVICIO: ms-pedidos
 
  ms-pedidos:
    build:
      context: ./ms-pedidos
      dockerfile: Dockerfile
    container_name: ms-pedidos
    networks:
      - app-network
    ports:
      - "8083:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8080
      APP_NOTIFICACIONES_URL: http://ms-notificaciones:8080
    restart: on-failure

  # MICROSERVICIO: ms-envios

  ms-envios:
    build:
      context: ./ms-envios
      dockerfile: Dockerfile
    container_name: ms-envios
    networks:
      - app-network
    ports:
      - "8084:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8080
    restart: on-failure

  # MICROSERVICIO: ms-notificaciones
  ms-notificaciones:
    build:
      context: ./ms-notificaciones
      dockerfile: Dockerfile
    container_name: ms-notificaciones
    networks:
      - app-network
    ports:
      - "8085:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8080
    restart: on-failure

  # API GATEWAY
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: smartlogix-gateway
    networks:
      - app-network
    ports:
      - "8080:8080"
    depends_on:
      - ms-usuarios
      - ms-inventario
      - ms-pedidos
      - ms-envios
      - ms-notificaciones
    environment:
      SERVER_PORT: 8080
      # URLs internas de cada MS (usando nombre de contenedor, NO localhost)
      MS_USUARIOS_URL: http://ms-usuarios:8080
      MS_INVENTARIO_URL: http://ms-inventario:8080
      MS_PEDIDOS_URL: http://ms-pedidos:8080
      MS_ENVIOS_URL: http://ms-envios:8080
      MS_NOTIFICACIONES_URL: http://ms-notificaciones:8080
    restart: on-failure

  frontend:
      build:
        context: ./frontend
        dockerfile: Dockerfile
      container_name: smartlogix-frontend
      networks:
        - app-network
      ports:
        - "80:80"
      depends_on:
        - api-gateway

networks:
  app-network:
    driver: bridge
