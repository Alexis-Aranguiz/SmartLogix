# ============================================================
# SmartLogix — Docker Compose completo
# Levanta: Zookeeper + Kafka + todos los microservicios
#
# Comandos útiles:
#   Levantar todo:        docker compose up --build
#   Solo infraestructura: docker compose up -d zookeeper kafka
#   Ver logs de un MS:    docker logs -f ms-pedidos
#   Parar todo:           docker compose down
# ============================================================

services:

  # ============================================================
  # INFRAESTRUCTURA: Zookeeper
  # Zookeeper es el coordinador de Kafka.
  # Kafka lo necesita para funcionar (en esta versión 7.4.0).
  # ============================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: smartlogix-zookeeper
    networks:
      - app-network
    ports:
      - "2181:2181"              # Puerto externo:interno de Zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      # Verifica que Zookeeper responde antes de iniciar Kafka
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # INFRAESTRUCTURA: Kafka
  # Broker de mensajes. Los microservicios se comunican a través
  # de topics Kafka (eventos de pedidos, notificaciones, etc.)
  # ============================================================
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: smartlogix-kafka
    networks:
      - app-network
    ports:
      - "9092:9092"              # Puerto externo:interno de Kafka
    depends_on:
      zookeeper:
        condition: service_healthy   # Espera a que Zookeeper esté listo
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # IMPORTANTE: Dentro de Docker los MS usan 'kafka:29092' (red interna)
      # Desde tu PC (localhost) se usa 'localhost:9092' (red externa)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      # Verifica que Kafka responde antes de iniciar los microservicios
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ============================================================
  # MICROSERVICIO: ms-usuarios
  # Puerto externo: 8081 → Puerto interno Spring Boot: 8080
  # Responsabilidad: registro, login, sesiones (Patrón Singleton)
  # ============================================================
  ms-usuarios:
    build:
      context: ./ms-usuarios     # Carpeta donde está el Dockerfile
      dockerfile: Dockerfile
    container_name: ms-usuarios
    networks:
      - app-network
    ports:
      - "8081:8080"              # PC:Contenedor
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      # Variables de entorno para Spring Boot
      # Dentro del contenedor, Kafka se llama 'kafka' (nombre del servicio en la red)
      # NO usar localhost porque dentro del contenedor localhost sería él mismo
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8080
    restart: on-failure          # Reinicia si falla (ej. si Kafka no está listo)

  # ============================================================
  # MICROSERVICIO: ms-inventario
  # Puerto externo: 8082 → Puerto interno Spring Boot: 8080
  # Responsabilidad: productos, stock, alertas (Patrón Observer Subject)
  # ============================================================
  ms-inventario:
    build:
      context: ./ms-inventario
      dockerfile: Dockerfile
    container_name: ms-inventario
    networks:
      - app-network
    ports:
      - "8082:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8080
    restart: on-failure

  # ============================================================
  # MICROSERVICIO: ms-pedidos
  # Puerto externo: 8083 → Puerto interno Spring Boot: 8080
  # Responsabilidad: pedidos, descuentos, pago (SAGA + Strategy + Facade)
  # ============================================================
  ms-pedidos:
    build:
      context: ./ms-pedidos
      dockerfile: Dockerfile
    container_name: ms-pedidos
    networks:
      - app-network
    ports:
      - "8083:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8080
      # URL de ms-notificaciones usando nombre del contenedor (no localhost)
      APP_NOTIFICACIONES_URL: http://ms-notificaciones:8080
    restart: on-failure

  # ============================================================
  # MICROSERVICIO: ms-envios
  # Puerto externo: 8084 → Puerto interno Spring Boot: 8080
  # Responsabilidad: rutas, transportistas, tracking (Circuit Breaker)
  # ============================================================
  ms-envios:
    build:
      context: ./ms-envios
      dockerfile: Dockerfile
    container_name: ms-envios
    networks:
      - app-network
    ports:
      - "8084:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8080
    restart: on-failure

  # ============================================================
  # MICROSERVICIO: ms-notificaciones
  # Puerto externo: 8085 → Puerto interno Spring Boot: 8080
  # Responsabilidad: email, SMS, push (Observer Consumer + Factory Method)
  # ============================================================
  ms-notificaciones:
    build:
      context: ./ms-notificaciones
      dockerfile: Dockerfile
    container_name: ms-notificaciones
    networks:
      - app-network
    ports:
      - "8085:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8080
    restart: on-failure

  # ============================================================
  # API GATEWAY
  # Puerto externo: 8080 → Puerto interno Spring Boot: 8080
  # Responsabilidad: enrutamiento, validación JWT, rate limiting
  # ============================================================
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: smartlogix-gateway
    networks:
      - app-network
    ports:
      - "8080:8080"
    depends_on:
      - ms-usuarios
      - ms-inventario
      - ms-pedidos
      - ms-envios
      - ms-notificaciones
    environment:
      SERVER_PORT: 8080
      # URLs internas de cada MS (usando nombre de contenedor, NO localhost)
      MS_USUARIOS_URL: http://ms-usuarios:8080
      MS_INVENTARIO_URL: http://ms-inventario:8080
      MS_PEDIDOS_URL: http://ms-pedidos:8080
      MS_ENVIOS_URL: http://ms-envios:8080
      MS_NOTIFICACIONES_URL: http://ms-notificaciones:8080
    restart: on-failure

  frontend:
      build:
        context: ./frontend
        dockerfile: Dockerfile
      container_name: smartlogix-frontend
      networks:
        - app-network
      ports:
        - "80:80"
      depends_on:
        - api-gateway

# ============================================================
# RED COMPARTIDA
# Todos los servicios están en 'app-network'
# Esto permite que se comuniquen por nombre (ej: 'kafka', 'ms-pedidos')
# en vez de por IP (que cambia cada vez que se reinicia un contenedor)
# ============================================================
networks:
  app-network:
    driver: bridge
