spring.application.name=ms-pedidos
server.port=8083

# Configuración de Base de Datos (H2 para pruebas rápidas)
spring.datasource.url=jdbc:h2:mem:pedidosdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

app.notificaciones.url=http://localhost:8085
# Configuración de Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=pedidos-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Evita que la app falle si Kafka no está disponible al arrancar
spring.kafka.admin.fail-fast=false
# Permite que los Listeners esperen a que el tópico exista en lugar de fallar
spring.kafka.listener.missing-topics-fatal=false

# Tiempo máximo de espera para intentar enviar un mensaje (5 segundos)
spring.kafka.producer.properties.max.block.ms=5000

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
server.error.include-message=always
